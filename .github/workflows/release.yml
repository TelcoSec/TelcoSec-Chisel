name: Build and Release TelcoSec-Chisel

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap squashfs-tools grub-pc-bin grub-efi-amd64-bin xorriso mtools

      - name: Build TelcoSec-Chisel Live ISO
        run: sudo bash build-iso.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: telcosec-chisel-iso
          path: telcosec-chisel-live.iso

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: telcosec-chisel-iso
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: telcosec-chisel-live.iso
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
