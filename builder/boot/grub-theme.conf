# TelcoSec-Chisel GRUB Bootloader Configuration
# Sourced automatically by update-grub from /etc/default/grub.d/99-telcosec.cfg

# Use the TelcoSec logo as the background image
GRUB_BACKGROUND="/usr/share/backgrounds/telcosec/logo.png"

# Color theme matching TelcoSec (normal: light-gray text on transparent, highlight: cyan text on transparent black)
GRUB_COLOR_NORMAL="light-gray/black"
GRUB_COLOR_HIGHLIGHT="cyan/black"
