# TelcoSec-Chisel OS Kernel Security Hardening
# Hardens the OS against local and network exploitation

# 1. Prevent Symlink & Hardlink Spoofing Attacks
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# 2. Kernel Self-Protection / Address Space Layout Randomization (ASLR)
kernel.randomize_va_space = 2

# 3. Restrict kernel log access and symbol lookup for non-root users
kernel.dmesg_restrict = 1
kernel.kptr_restrict = 2

# 4. Disable ICMP Redirect Acceptance (Prevents MitM / route redirection attacks)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# 5. Disable IP Source Routing (Prevents spoofed packet routing)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# 6. Enable TCP SYN Cookies (Protection against SYN flood DDoS attacks)
net.ipv4.tcp_syncookies = 1

# 7. Enable Reverse Path Filtering (Mitigates IP spoofing)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# 8. Log Martians (log packets with impossible/spoofed source addresses)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# 9. Ignore ICMP broadcasts (Mitigates Smurf DDoS attacks)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# 10. Disable send redirects (Since this is a researcher node, it should not act as a router)
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
