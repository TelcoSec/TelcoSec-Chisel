# TelcoSec-Chisel SCTP Stack Kernel Optimizations
# Configures buffers, queues, timeouts, and retransmissions for high-efficiency scanning and fuzzing

# 1. SCTP Buffer Size & Memory Allocations (increased for high-bandwidth SIGTRAN/5G)
net.sctp.sctp_mem = 16777216 20971520 25165824
net.sctp.sctp_rmem = 4096 87380 16777216
net.sctp.sctp_wmem = 4096 16384 16777216

# 2. General Network Socket Limits (global maximum constraints)
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.somaxconn = 2048
net.core.netdev_max_backlog = 5000

# 3. Fail-Fast Scanning Optimizations (RTO and Retransmit reductions to prevent tool hangs)
# Decreases initial retransmissions to detect closed/filtered ports faster
net.sctp.max_init_retransmits = 3
# Decreases association retransmission limits for unresponsive peers (standard is 10)
net.sctp.association_max_retrans = 3
# Decreases maximum path retransmissions (standard is 5)
net.sctp.path_max_retrans = 2
# Set minimum RTO to 200ms (standard is 1000ms) to accelerate discovery
net.sctp.rto_min = 200
